# Codecov configuration — controls the per-PR coverage checks and comment.
# Docs: https://docs.codecov.com/docs/codecov-yaml
coverage:
  # Round percentages and show two significant figures in the UI/comment.
  precision: 2
  round: down
  range: '50...100'

  status:
    # `project` = coverage of the whole tracked codebase. `informational`
    # means it reports the number and never blocks the merge — good while the
    # suite is still growing so an overall-percentage dip can't fail a PR.
    project:
      default:
        target: auto
        threshold: 1%
        informational: true

    # `patch` = coverage of ONLY the lines changed in the PR. This is the
    # signal that matters per-PR: it nudges every change to ship with tests.
    # Also informational for now; flip `informational: false` and set a
    # `target` (e.g. 80%) once the team wants it to gate merges.
    patch:
      default:
        target: 80%
        threshold: 0%
        informational: true

# Post a comment on each PR summarizing coverage and the per-file diff.
comment:
  layout: 'header, diff, files, footer'
  behavior: default
  require_changes: false

# Mirror the vitest `coverage.include`/`exclude` scope so Codecov's view of the
# repo matches what the unit suite instruments.
ignore:
  - '**/*.test.ts'
  - '**/*.d.ts'
  - '**/*.config.*'
  - 'lib/schema/**'
  - 'lib/**/types.ts'
